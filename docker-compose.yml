version: '3.8'

services:
  cyberneticircus:
    build:
      context: ..
      dockerfile: cyberneticircus/Dockerfile
    container_name: cyberneticircus_app
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://host.docker.internal:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SCRATCH_WORKSPACE_DIR=/app
      - PROJECT_DIR=/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # living workspace mounted at its host-absolute path so the graph's
      # instruction_file_path values resolve identically inside the container
      - /Users/isaacwr/claude_code/cyberneticircus:/Users/isaacwr/claude_code/cyberneticircus
      - /Users/isaacwr/claude_code/cyberneticircus/cyberneticircus:/app/cyberneticircus
    restart: unless-stopped
